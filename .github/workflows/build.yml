name: Build Images

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [ main ]
    paths-ignore: [ '**.md' ]
  workflow_dispatch:
    inputs:
      image_to_build:
        description: 'Which image to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - mermaid-live-editor

permissions:
  contents: read
  packages: write

jobs:
  build-mermaid-live-editor:
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.image_to_build == 'all' ||
      github.event.inputs.image_to_build == 'mermaid-live-editor'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Checkout upstream Mermaid Live Editor
        uses: actions/checkout@v4
        with:
          # Upstream publishes no git tags; master carries the released package
          # version. Rebuilt daily; each image is tagged with the exact version +
          # commit SHA below for traceability.
          repository: mermaid-js/mermaid-live-editor
          ref: master
          path: mermaid-live-editor/mermaid-src
          fetch-depth: 1

      - name: Prepare tags (owner, version, commit)
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          echo "OWNER_LC=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          echo "COMMIT_SHA=$(git -C mermaid-live-editor/mermaid-src rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "VERSION=$(jq -r .version mermaid-live-editor/mermaid-src/package.json)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./mermaid-live-editor
          file: ./mermaid-live-editor/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/mermaid-live-editor:latest
            ghcr.io/${{ env.OWNER_LC }}/mermaid-live-editor:${{ env.VERSION }}
            ghcr.io/${{ env.OWNER_LC }}/mermaid-live-editor:${{ env.COMMIT_SHA }}
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/mermaid-live-editor:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/mermaid-live-editor:buildcache,mode=max
