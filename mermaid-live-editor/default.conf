server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Kroki GET links carry the whole (deflate+base64) diagram in the URL; raise the
    # header buffers so larger diagrams don't 414.
    large_client_header_buffers 4 32k;

    # Same-origin reverse-proxy for Kroki. The bundle was built with
    # MERMAID_KROKI_RENDERER_URL=/kroki, so the browser requests
    # <origin>/kroki/mermaid/svg/<data>; we strip /kroki/ and forward to the in-cluster
    # kroki service. "kroki" resolves via cluster DNS in whatever namespace this runs in.
    location /kroki/ {
        proxy_pass http://kroki:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback.
    location / {
        try_files $uri /index.html;
    }
}
